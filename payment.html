<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идём в кино — оплата</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">
    <header class="header">
        <div class="container">
            <h1 class="header__title">ИДЁМ<span class="light">В</span>КИНО</h1>
        </div>
    </header>
    <main class="container payment-container">
        <p class="payment-title">ВЫ ВЫБРАЛИ БИЛЕТЫ:</p>
        <div id="booking-info"></div>
        <div class="text-center">
            <button class="btn btn--primary" id="confirm-btn">ПОЛУЧИТЬ КОД БРОНИРОВАНИЯ</button>
        </div>
        <p class="mt-4 text-muted text-booking-info">После оплаты билет будет доступен в этом окне, а также придёт вам
            на почту. Покажите QR-код нашему контроллёру у входа в зал.<br>Приятного просмотра!</p>
    </main>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/guest/payment.js"></script>
</body>
</html>
