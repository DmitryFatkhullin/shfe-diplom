<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Администратор — вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="page admin-page">
    <header class="admin-header">
        <div class="container align-items-center">
            <h1 class="admin-header__title">ИДЁМ<span class="admin-title__light">В</span>КИНО</h1>
            <p class="admin-header__subtitle">Администраторррская</p>
        </div>
    </header>
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="admin-section-login">
                    <h2 class="admin-login-section__title">АВТОРИЗАЦИЯ</h2>
                    <form class="login-form" id="login-form">
                        <div class="mb-3 login-form-email">
                            <label for="email" class="form-label-text-login">E-mail</label>
                            <input type="email" class="form-control" id="email" value="shfe-diplom@netology.ru"
                                placeholder="example@domain.xyz">
                        </div>
                        <div class="mb-3 login-form-password">
                            <label for="password" class="form-label-text-login">Пароль</label>
                            <input type="password" class="form-control" id="password" value="shfe-diplom">
                        </div>
                        <button type="submit" class="btn btn--primary-authorization">АВТОРИЗОВАТЬСЯ</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/api.js"></script>
    <script src="../js/admin/auth.js"></script>
</body>
</html>
