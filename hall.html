<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идём в кино — выбор мест</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">
    <header class="header">
        <div class="container">
            <h1 class="header__title">ИДЁМ<span class="light">В</span>КИНО</h1>
        </div>
    </header>
    <main class="container-hall">
        <div class="row hall-scheme-row">
            <div class="col-md-6 hall-scheme-col">
                <h2 id="film-title">Звёздные войны XXIII: Атака клонированных клонов</h2>
                <p class="seance-paragraph"><span class="seance-text">Начало сеанса: <span id="seance-time">18:30</span>
                    </span></p>
                <p><span class="seance-hall"><span id="hall-name"></span></span></p>
            </div>
            <div class="col-md-1 hall-scheme-col hall-scheme-col-icon"><img src="assets/buying__info-hint.jpg"
                    alt="Тапните дважды, чтобы увеличить"></div>
        </div>
        <div class="hall-scheme" id="hall-scheme"></div>
        <div class="legend" id="legend">
            <div class="legend-row">
                <div class="legend-item">
                    <span class="legend-color legend-color--standart"></span><span class="legend-color-text"
                        id="standart-price"> Свободно <span class="standart-price"></span></span>
                </div>
                <div class="legend-item">
                    <span class="legend-color legend-color--taken"></span><span class="legend-color-text"> Занято</span>
                </div>
            </div>
            <div class="legend-row">
                <div class="legend-item">
                    <span class="legend-color legend-color--vip"></span><span class="legend-color-text" id="vip-price">
                        Свободно VIP <span class="vip-price"></span></span>
                </div>
                <div class="legend-item">
                    <span class="legend-color legend-color--selected"></span><span class="legend-color-text">
                        Выбрано</span>
                </div>
            </div>
        </div>
        <div class="text-center">
            <button class="btn btn--primary-book" id="book-btn">ЗАБРОНИРОВАТЬ</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/guest/hall.js"></script>
</body>
</html>
